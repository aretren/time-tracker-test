<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Информация о проекте</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/air-datepicker@3.3.5/air-datepicker.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="favicon.ico">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="project-header-info">
                <h1 id="project-name-header">Загрузка...</h1>
                <span id="username-display"></span>
            </div>
            <a href="#" id="edit-project-btn" class="header-btn hidden" title="Редактировать проект">&#9998;</a>
            <a href="participant.html" class="header-back-btn" title="К моим проектам">&#8592;</a>
        </header>

        <main class="main-content project-page-layout">
            <div class="schedule-column">
                <div class="widget">
                    <h2>Календарь тренировок</h2>
                    <div id="calendar-container"></div>
                </div>
                <div class="widget">
                    <h2>Предстоящие тренировки</h2>
                    <ul id="training-list" class="training-list"></ul>
                </div>
            </div>
            <div class="management-column">
                <!-- Блок для материалов -->
                <div id="materials-widget" class="widget">
                    <div class="widget-header" style="display: flex; justify-content: space-between; align-items: center;">
                        <h2 class="collapsible-header">Материалы</h2>
                        <button id="show-add-material-modal-btn" class="header-action-btn" title="Добавить материал" style="width: auto; font-size: 1.5rem;">+</button>
                    </div>
                    <div id="materials-content">
                        <!-- Сюда будет загружаться контент материалов -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/air-datepicker@3.3.5/air-datepicker.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="participant_project.js"></script>

    <!-- Image Viewer Modal -->
    <div id="image-viewer-modal" class="modal">
        <span class="close-btn" id="close-image-viewer-btn">&times;</span>
        <img class="modal-content" id="image-viewer-content">
        <button id="image-viewer-delete-btn" class="delete-photo-modal-btn" title="Удалить фото">🗑️</button>
    </div>

    <!-- Add Material Modal -->
    <div id="add-material-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Добавить материал</h2>
            <form id="add-material-form" class="add-form">
                <div class="form-group" id="material-participant-group">
                    <label for="material-participant-select">Назначить участнику</label>
                    <select id="material-participant-select">
                        <!-- Options will be populated by JS -->
                    </select>
                </div>
                <div class="form-group">
                    <label for="material-type-select">Тип материала</label>
                    <select id="material-type-select">
                        <option value="">-- Выберите тип --</option>
                        <option value="party">Партия</option>
                        <option value="costume">Костюм</option>
                        <option value="task">Задача</option>
                        <option value="note">Заметка</option>
                    </select>
                </div>
                <div id="material-dynamic-form-content">
                    <!-- Dynamic form fields will be injected here -->
                </div>
                <button type="submit">Сохранить</button>
            </form>
        </div>
    </div>
    </body>
    </html>
