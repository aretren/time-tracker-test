<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои проекты и тренировки</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/air-datepicker@3.3.5/air-datepicker.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="favicon.ico">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-title">
                <h1>Мои проекты и тренировки</h1>
                <span id="username-display"></span>
            </div>
            <button id="manage-participants-btn" class="header-btn hidden" title="Управление участниками">👥</button>
            <a href="app.html" class="header-back-btn" title="Перейти к трекеру">⏱️</a>
        </header>

        <main class="main-content" style="padding: 1rem;">
            <div class="widget">
                <h2>Календарь тренировок</h2>
                <div id="calendar-container"></div>
            </div>
            <div id="projects-container">
                <!-- Проекты и тренировки будут загружены сюда -->
                <p>Загрузка данных...</p>
            </div>
             <div id="archived-projects-section" class="widget hidden">
                <h2 class="collapsible-header">Архив проектов</h2>
                <div id="archived-projects-list">
                    <!-- Archived projects will be loaded here -->
                </div>
            </div>
        </main>

        <!-- Add Training Modal -->
        <div id="add-training-modal" class="modal">
            <div class="modal-content">
                <span class="close-btn">&times;</span>
                <h2>Назначить новую тренировку</h2>
                <form id="add-training-form" class="add-form">
                    <div class="form-group">
                        <label for="training-project-select">Проект</label>
                        <select id="training-project-select" required></select>
                    </div>
                    <div class="form-group">
                        <label for="training-start-time">Начало</label>
                        <input type="datetime-local" id="training-start-time" required step="600">
                    </div>
                    <div class="form-group">
                        <label for="training-end-time">Окончание</label>
                        <input type="datetime-local" id="training-end-time" required step="600">
                    </div>
                    <div class="form-group">
                        <label for="training-location-select">Место проведения</label>
                        <select id="training-location-select"></select>
                        <input type="text" id="new-training-location-input" class="form-control hidden" placeholder="Введите новое место..." style="margin-top: 0.5rem;">
                    </div>
                    <div class="form-group">
                        <label for="training-comment">Комментарий</label>
                        <textarea id="training-comment" placeholder="Комментарий"></textarea>
                    </div>
                    <button type="submit">Назначить</button>
                </form>
            </div>
        </div>

        <!-- Create Project Modal -->
        <div id="create-project-modal" class="modal">
            <div class="modal-content">
                <span class="close-btn">&times;</span>
                <h2>Создать новый проект</h2>
                <form id="create-project-form">
                    <div class="form-group">
                        <label for="project-name">Название проекта</label>
                        <input type="text" id="project-name" required>
                    </div>
                    <div class="form-group">
                        <label>Участники</label>
                        <div id="user-list-checkboxes" class="user-checkbox-list">
                            <!-- User checkboxes will be injected here -->
                        </div>
                    </div>
                    <button type="submit">Создать проект</button>
                </form>
            </div>
        </div>
        
        <!-- Manage Participants Modal -->
        <div id="manage-participants-modal" class="modal">
            <div class="modal-content">
                <span class="close-btn">&times;</span>
                <h2>Управление участниками</h2>
                
                <div class="participants-management-container">
                    <!-- Create User Form -->
                    <div class="create-user-form widget">
                        <h3>Создать нового участника</h3>
                        <form id="create-participant-form">
                            <div class="form-group">
                                <label for="new-participant-login">Логин</label>
                                <input type="text" id="new-participant-login" required>
                            </div>
                            <div class="form-group">
                                <label for="new-participant-password">Пароль</label>
                                <input type="password" id="new-participant-password" required>
                            </div>
                            <button type="submit">Создать</button>
                        </form>
                    </div>

                    <!-- User List -->
                    <div class="user-list-container widget">
                        <h3>Список участников</h3>
                        <div id="participant-list">
                            <!-- Participant items will be loaded here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="color-picker-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/air-datepicker@3.3.5/air-datepicker.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/@jaames/iro@5.5.0/dist/iro.min.js"></script>
    <script src="participant.js"></script>
</body>
</html>
